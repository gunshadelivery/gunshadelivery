<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunsha Delivery - สดใหม่ ส่งไว ถึงมือ 🌿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cart-open { transform: translateX(0); }
        .cart-closed { transform: translateX(100%); }
        .active-size { @apply bg-emerald-600 text-white border-emerald-600; }
        .inactive-size { @apply bg-white text-slate-600 border-slate-200 hover:border-emerald-300; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <!-- NAVBAR -->
    <nav class="bg-emerald-600 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="handleLogoClick()">
                <span class="text-xl">🌿</span>
                <h1 class="text-lg font-bold">Cannabis Delivery</h1>
            </div>
            <button onclick="toggleCart()" class="relative p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span id="cartCountBadge" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </nav>

    <!-- HERO / PROMO -->
    <header class="bg-emerald-700 text-white px-4 py-8 text-center pb-20 rounded-b-[3rem] shadow-inner mb-[-3rem]">
        <h2 class="text-2xl font-bold mb-2">คุณภาพพรีเมียม ส่งตรงถึงหน้าบ้าน</h2>
        <p class="text-emerald-100 text-sm opacity-90">ชำระเงินผ่านแอป แล้วรอรับของได้เลย!</p>
    </header>

    <!-- SEARCH & FILTER -->
    <div class="max-w-md mx-auto px-4 relative z-10">
        <div class="bg-white rounded-2xl shadow-xl p-2 flex items-center border border-emerald-50">
            <input type="text" id="searchInput" onkeyup="renderProducts(this.value)" placeholder="ค้นหาสายพันธุ์ที่ชื่นชอบ..." class="flex-1 px-4 py-2 outline-none text-slate-600 bg-transparent">
            <div class="bg-emerald-500 p-2 rounded-xl text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <!-- PRODUCT LIST -->
    <main class="max-w-md mx-auto px-4 mt-8 pb-10">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-slate-800">รายการสินค้าวันนี้</h3>
        </div>
        
        <div id="productGrid" class="grid grid-cols-2 gap-4">
            <!-- Loading States -->
            <div class="animate-pulse bg-white p-4 rounded-2xl h-48 border border-slate-100"></div>
            <div class="animate-pulse bg-white p-4 rounded-2xl h-48 border border-slate-100"></div>
        </div>
    </main>

    <!-- CART SIDEBAR (OVERLAY) -->
    <div id="cartOverlay" class="fixed inset-0 bg-black/40 z-50 hidden backdrop-blur-sm transition-opacity duration-300" onclick="toggleCart()"></div>
    <div id="cartSidebar" class="fixed top-0 right-0 h-full w-[85%] max-w-sm bg-white z-50 shadow-2xl transition-transform duration-300 transform translate-x-full flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-emerald-600 text-white">
            <h3 class="text-xl font-bold flex items-center gap-2">ตะกร้าสินค้า <span id="cartTotalCount" class="text-sm font-normal opacity-80">(0)</span></h3>
            <button onclick="toggleCart()" class="p-2 hover:bg-emerald-700 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Cart items will be here -->
        </div>

        <div class="p-6 border-t bg-slate-50 space-y-4">
            <div class="flex justify-between items-center text-slate-500 text-sm">
                <span>ยอดรวมสินค้า</span>
                <span id="cartSubtotal" class="font-bold text-slate-800 text-lg">0.00 ฿</span>
            </div>
            <button onclick="goToCheckout()" id="checkoutBtn" disabled class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition disabled:opacity-50 disabled:cursor-not-allowed">สั่งซื้อผ่าน LINE</button>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkoutModal" class="fixed inset-0 z-[60] bg-black/60 hidden backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in duration-300">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800">รายละเอียดการจัดส่ง</h3>
                <button onclick="closeCheckout()" class="p-2 hover:bg-slate-100 rounded-full"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6">
                <!-- FORM -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">ชื่อ-นามสกุล *</label>
                        <input type="text" id="custName" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-emerald-500 focus:ring-0 outline-none transition" placeholder="ระบุชื่อผู้รับ">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">เบอร์โทรศัพท์ *</label>
                        <input type="tel" id="custPhone" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-emerald-500 focus:ring-0 outline-none transition" placeholder="08x-xxx-xxxx">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">ที่อยู่จัดส่ง *</label>
                        <textarea id="custAddress" rows="3" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-emerald-500 focus:ring-0 outline-none transition" placeholder="ระบุเลขที่บ้าน ถนน แขวง/เขต..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">ลิงก์ Google Maps (ถ้ามี)</label>
                        <input type="url" id="custMap" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-emerald-500 focus:ring-0 outline-none transition" placeholder="แปะลิงก์หมุดที่นี่">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">แนบหลักฐานการโอนเงิน *</label>
                        <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center cursor-pointer hover:bg-emerald-50 hover:border-emerald-300 transition group" onclick="document.getElementById('slipInput').click()">
                            <input type="file" id="slipInput" accept="image/*" class="hidden" onchange="previewSlip(this)">
                            <div id="slipPreview" class="flex flex-col items-center">
                                <svg class="w-10 h-10 text-slate-300 group-hover:text-emerald-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                <p class="text-sm text-slate-500 font-medium group-hover:text-emerald-600">กดเพื่อแนบสลิปโอนเงิน</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t bg-slate-50">
                <button onclick="submitOrder()" id="confirmBtn" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-extrabold text-lg shadow-xl hover:bg-emerald-700 transition flex items-center justify-center gap-2">ยืนยันและสั่งซื้อ</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1rczsaPil58aAm_kw1FdhopdJA0U6v6x2ELROaupP09g/gviz/tq?tqx=out:csv";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx-bFdAzLgUst21PNyQ0Tu7_8dEjzqyikuSSemJCVjM4y_cJYpVJSWHooGZDdwtHOQ0Yg/exec";
        
        let products = []; // Keyed by Name
        let cart = [];

        // Secret Admin Access
        let logoClickCount = 0;
        let logoClickTimeout;
        function handleLogoClick() {
            logoClickCount++;
            clearTimeout(logoClickTimeout);
            if (logoClickCount >= 5) { window.location.href = "admin.html"; logoClickCount = 0; }
            logoClickTimeout = setTimeout(() => { logoClickCount = 0; }, 2000);
        }

        function loadProductsFromSheet(callback) {
            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true,
                complete: function(results) {
                    const data = results.data;
                    const grouped = {};
                    
                    data.forEach(item => {
                        if(!item.name) return;
                        if(!grouped[item.name]) {
                            let tags = [];
                            if (item.tags) tags = item.tags.split(',').map(t => t.trim()).filter(t => t !== '');
                            grouped[item.name] = {
                                name: item.name,
                                note: item.note || '',
                                image: item.image || '',
                                tags: tags,
                                status: (item.status || '').trim().toLowerCase(),
                                variants: [],
                                selectedVariantIdx: 0,
                                totalSold: 0 // Overall sold count for the strain
                            };
                        }
                        
                        const stock = parseInt(item.stock) || 0;
                        const sold = parseInt(item.sold_count) || 0;
                        
                        grouped[item.name].variants.push({
                            size: item.size || '1G',
                            price: parseFloat(item.price) || 0,
                            stock: stock,
                            sold: sold
                        });
                        grouped[item.name].totalSold += sold;
                    });

                    products = Object.values(grouped);
                    if (callback) callback();
                }
            });
        }

        function renderProducts(filter = "") {
            const grid = document.getElementById("productGrid");
            grid.innerHTML = "";
            const q = filter.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.note.toLowerCase().includes(q));

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center text-slate-400 py-10">ไม่พบสินค้า</div>`;
                return;
            }

            filtered.forEach((p, pIdx) => {
                const card = document.createElement("div");
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col";
                const isOutOfStock = p.status === 'หมด' || p.status === 'sold out' || p.status === '0';
                
                // Select Current Variant
                const variant = p.variants[p.selectedVariantIdx];
                const isVariantOutOfStock = variant.stock <= 0;

                card.innerHTML = `
                    <div class="h-32 bg-slate-100 flex items-center justify-center relative overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover ${isOutOfStock || isVariantOutOfStock ? 'grayscale opacity-75' : ''}" onerror="this.outerHTML='<span class=\\'text-3xl\\'>🌿</span>';" />
                        <div class="absolute top-2 left-2 flex flex-col gap-1">
                            ${p.tags.length ? `<span class="bg-emerald-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm w-fit">${p.tags[0]}</span>` : ''}
                            ${p.totalSold > 0 ? `<span class="bg-orange-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold shadow-sm w-fit">ขายแล้ว ${p.totalSold}+</span>` : ''}
                        </div>
                        ${(isOutOfStock || isVariantOutOfStock) ? `<div class="absolute inset-0 bg-slate-900/40 flex items-center justify-center transition-all opacity-100"><span class="bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">หมดชั่วคราว</span></div>` : ''}
                    </div>
                    <div class="p-3 flex-1 flex flex-col">
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-800 leading-tight text-sm">${p.name}</h3>
                            <p class="text-[10px] text-slate-400 mt-1 line-clamp-1">${p.note}</p>
                        </div>
                        
                        <!-- VARIANT SELECTOR -->
                        <div class="mt-3 flex flex-wrap gap-1">
                            ${p.variants.map((v, vIdx) => `
                                <button onclick="selectVariant(${pIdx}, ${vIdx})" class="px-2 py-1 text-[10px] border rounded-lg transition-all font-bold ${p.selectedVariantIdx === vIdx ? 'bg-emerald-600 border-emerald-600 text-white' : 'bg-slate-50 text-slate-500 border-slate-100'} ${v.stock <= 0 ? 'opacity-40' : ''}">
                                    ${v.size}
                                </button>
                            `).join('')}
                        </div>

                        ${variant.stock > 0 && variant.stock <= 5 ? `<p class="text-[9px] text-red-500 font-bold mt-2">🔥 เหลือเพียง ${variant.stock} ชิ้น!</p>` : ''}

                        <div class="mt-3 flex items-center justify-between">
                            <p class="font-bold text-emerald-600 text-sm">${variant.price.toLocaleString()} ฿</p>
                            <button onclick="addToCart(${pIdx}, ${p.selectedVariantIdx})" ${isOutOfStock || isVariantOutOfStock ? 'disabled' : ''} class="bg-emerald-100 text-emerald-700 p-2 rounded-lg hover:bg-emerald-600 hover:text-white transition-all disabled:opacity-30">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function selectVariant(pIdx, vIdx) {
            products[pIdx].selectedVariantIdx = vIdx;
            renderProducts(document.getElementById('searchInput').value);
        }

        // --- CART LOGIC ---
        function addToCart(pIdx, vIdx) {
            const product = products[pIdx];
            const variant = product.variants[vIdx];
            
            const existing = cart.find(item => item.name === product.name && item.size === variant.size);
            if (existing) existing.qty++;
            else cart.push({ name: product.name, size: variant.size, price: variant.price, qty: 1, image: product.image });

            updateCartUI();
            toggleCart(true);
        }

        function toggleCart(force = null) {
            const sidebar = document.getElementById("cartSidebar");
            const overlay = document.getElementById("cartOverlay");
            const isOpen = force !== null ? force : sidebar.classList.contains("translate-x-full");
            sidebar.classList.toggle("translate-x-full", !isOpen);
            overlay.classList.toggle("hidden", !isOpen);
        }

        function updateCartUI() {
            const container = document.getElementById("cartItemsContainer");
            const badge = document.getElementById("cartCountBadge");
            const subtotalEl = document.getElementById("cartSubtotal");
            const checkoutBtn = document.getElementById("checkoutBtn");

            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            badge.textContent = count;
            badge.classList.toggle("hidden", count === 0);
            document.getElementById("cartTotalCount").textContent = `(${count})`;

            let subtotal = 0;
            container.innerHTML = cart.length === 0 ? `<div class="text-center py-20 text-slate-400">ยังไม่มีสินค้าในตะกร้า</div>` : '';
            
            cart.forEach((item, idx) => {
                subtotal += item.price * item.qty;
                container.innerHTML += `
                    <div class="flex gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <img src="${item.image}" class="w-16 h-16 object-cover rounded-xl bg-white shadow-sm" onerror="this.outerHTML='🌿';">
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800 text-sm">${item.name}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${item.size}</p>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-emerald-600 font-bold text-sm">${(item.price * item.qty).toLocaleString()} ฿</p>
                                <div class="flex items-center gap-3">
                                    <button onclick="updateQty(${idx}, -1)" class="w-6 h-6 border flex items-center justify-center p-1 rounded-full">-</button>
                                    <span class="text-sm font-bold">${item.qty}</span>
                                    <button onclick="updateQty(${idx}, 1)" class="w-6 h-6 border flex items-center justify-center p-1 rounded-full">+</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            subtotalEl.textContent = subtotal.toLocaleString() + " ฿";
            checkoutBtn.disabled = cart.length === 0;
        }

        function updateQty(idx, change) {
            cart[idx].qty += change;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        // --- CHECKOUT ---
        function goToCheckout() { document.getElementById('checkoutModal').classList.remove('hidden'); }
        function closeCheckout() { document.getElementById('checkoutModal').classList.add('hidden'); }

        function previewSlip(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('slipPreview').innerHTML = `<img src="${e.target.result}" class="h-32 w-auto mx-auto rounded-xl shadow-md"><p class="mt-2 text-xs text-emerald-600 font-bold">✓ เลือกสลิปแล้ว</p>`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitOrder() {
            const btn = document.getElementById('confirmBtn');
            const data = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value,
                map: document.getElementById('custMap').value,
                slip: document.getElementById('slipInput').files[0]
            };

            if(!data.name || !data.phone || !data.address || !data.slip) return alert("กรุณากรอกข้อมูลและแนบสลิปให้ครบถ้วน");

            btn.disabled = true;
            btn.innerHTML = "กำลังบันทึกออเดอร์...";

            try {
                // 1. Upload Slip
                const formData = new FormData(); formData.append('image', data.slip);
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=467157500c7b535f4c9839accf416565`, { method: 'POST', body: formData });
                const imgData = await imgRes.json();
                if(!imgData.success) throw new Error("Upload Fail");

                // 2. Log to Sheet
                let orderItems = cart.map(i => `${i.name} [${i.size}] x${i.qty}`).join(', ');
                let itemsArray = cart.map(i => ({ name: i.name, size: i.size, qty: i.qty }));
                let subtotal = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

                await fetch(GAS_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({
                        action: "log", name: data.name, phone: data.phone, address: data.address,
                        mapUrl: data.map, items: orderItems, itemsArray: itemsArray, total: subtotal, slipUrl: imgData.data.url, status: "รอดำเนินการ"
                    })
                });

                // 3. To LINE
                const lineMsg = `🌿 ออเดอร์ใหม่! [GUNSHA DELIVERY]\n👤 คุณ: ${data.name}\n📞 เบอร์: ${data.phone}\n📍 ที่อยู่: ${data.address}\n🔗 พิกัด: ${data.map || "-"}\n\n🛒 รายการ:\n${orderItems}\n💰 ยอดรวม: ${subtotal} บาท\n\n🖼️ สลิป: ${imgData.data.url}`;
                window.location.href = `https://line.me/R/oaMessage/@640tybpp/?${encodeURIComponent(lineMsg)}`;
            } catch(e) {
                alert("เกิดข้อผิดพลาดในการสั่งซื้อ กรุณาลองใหม่อีกครั้ง");
                btn.disabled = false;
                btn.innerHTML = "ยืนยันและสั่งซื้อ";
            }
        }

        document.addEventListener('DOMContentLoaded', () => loadProductsFromSheet(renderProducts));
    </script>
</body>
</html>
